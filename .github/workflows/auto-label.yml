name: Auto Label

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Label based on file changes
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          backend:
            - 'backend/**'
          ai:
            - 'ai/**'
          docker:
            - '**/Dockerfile'
            - 'docker-compose.yml'
          docs:
            - '**.md'
            - 'docs/**'
          github:
            - '.github/**'

    - name: Add labels to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const labels = [];
          
          if ('${{ steps.changes.outputs.backend }}' === 'true') {
            labels.push('backend', 'dotnet');
          }
          
          if ('${{ steps.changes.outputs.ai }}' === 'true') {
            labels.push('ai', 'python');
          }
          
          if ('${{ steps.changes.outputs.docker }}' === 'true') {
            labels.push('docker');
          }
          
          if ('${{ steps.changes.outputs.docs }}' === 'true') {
            labels.push('documentation');
          }
          
          if ('${{ steps.changes.outputs.github }}' === 'true') {
            labels.push('github-actions', 'ci/cd');
          }
          
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }

    - name: Add labels to issue
      if: github.event_name == 'issues'
      uses: actions/github-script@v7
      with:
        script: |
          const title = context.payload.issue.title.toLowerCase();
          const body = context.payload.issue.body?.toLowerCase() || '';
          const content = `${title} ${body}`;
          
          const labels = [];
          
          // Bug-related keywords
          if (content.includes('bug') || content.includes('error') || content.includes('issue') || content.includes('problem')) {
            labels.push('bug');
          }
          
          // Feature-related keywords
          if (content.includes('feature') || content.includes('enhancement') || content.includes('improvement')) {
            labels.push('enhancement');
          }
          
          // Documentation-related keywords
          if (content.includes('documentation') || content.includes('docs') || content.includes('readme')) {
            labels.push('documentation');
          }
          
          // Question-related keywords
          if (content.includes('question') || content.includes('how to') || content.includes('help')) {
            labels.push('question');
          }
          
          // Component-specific keywords
          if (content.includes('backend') || content.includes('api') || content.includes('dotnet') || content.includes('.net')) {
            labels.push('backend', 'dotnet');
          }
          
          if (content.includes('ai') || content.includes('python') || content.includes('openai')) {
            labels.push('ai', 'python');
          }
          
          if (content.includes('docker') || content.includes('container')) {
            labels.push('docker');
          }
          
          if (content.includes('rabbitmq') || content.includes('message') || content.includes('queue')) {
            labels.push('rabbitmq');
          }
          
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }
